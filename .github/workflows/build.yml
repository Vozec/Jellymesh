name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore JellyfinFederation.sln

      - name: Build (Release)
        run: dotnet build JellyfinFederation.sln -c Release --no-restore /warnaserror

      - name: Test
        run: dotnet test tests/Jellyfin.Plugin.Federation.Tests/Jellyfin.Plugin.Federation.Tests.csproj -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/**/TestResults/*.trx

      - name: Package plugin zip
        run: bash build/package.sh

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: federation-plugin
          path: build/output/*.zip

  diagrams:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Render mermaid diagrams
        run: bash docs/render-diagrams.sh
      - name: Verify all source diagrams rendered
        run: |
          set -e
          expected=$(grep -c '^```mermaid$' docs/*.md)
          actual=$(ls docs/diagrams/*.png 2>/dev/null | wc -l)
          echo "expected $expected PNGs, got $actual"
          [ "$expected" = "$actual" ]
      - uses: actions/upload-artifact@v4
        with:
          name: diagrams
          path: docs/diagrams/*.png
