name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore JellyfinFederation.sln

      - name: Build (Release)
        run: dotnet build JellyfinFederation.sln -c Release --no-restore /warnaserror

      - name: Test (with coverage)
        run: |
          dotnet test tests/Jellyfin.Plugin.Federation.Tests/Jellyfin.Plugin.Federation.Tests.csproj \
            -c Release --no-build \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory tests/Jellyfin.Plugin.Federation.Tests/TestResults

      - name: Coverage summary
        if: always()
        run: |
          # Coverlet emits coverage.cobertura.xml under a random GUID directory.
          # Use find rather than a shell glob (bash globs don't expand ** without globstar).
          shopt -s globstar nullglob
          coverage_files=(tests/**/coverage.cobertura.xml)
          if [ ${#coverage_files[@]} -eq 0 ]; then
            echo "::warning::No coverage files found - skipping report"
            exit 0
          fi
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator \
            "-reports:$(IFS=';'; echo "${coverage_files[*]}")" \
            -targetdir:coverage-report \
            -reporttypes:"MarkdownSummaryGithub;TextSummary"
          cat coverage-report/Summary.txt
          if [ -f "coverage-report/SummaryGithub.md" ]; then
            cat coverage-report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
          fi
        shell: bash

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            tests/**/TestResults/*.trx
            tests/**/coverage.cobertura.xml
            coverage-report/

      - name: Package plugin zip
        run: bash build/package.sh

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: federation-plugin
          path: build/output/*.zip

  format:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: dotnet format --verify-no-changes
        # Whitespace + ordering only - does not lint correctness. Catches drift before
        # it accumulates across the codebase.
        run: dotnet format JellyfinFederation.sln --verify-no-changes --severity warn || (echo "::warning::dotnet format would change files - run 'dotnet format' locally before commit" && exit 0)

  diagrams:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Render mermaid diagrams
        run: bash docs/render-diagrams.sh
      - name: Verify all source diagrams rendered
        run: |
          set -e
          # grep -c '^```mermaid$' outputs `path:count` per file; sum the counts.
          expected=$(grep -c '^```mermaid$' docs/*.md | awk -F: '{ s += $2 } END { print s }')
          actual=$(ls docs/diagrams/*.svg 2>/dev/null | wc -l)
          echo "expected $expected SVGs, got $actual"
          [ "$expected" = "$actual" ]
      - uses: actions/upload-artifact@v4
        with:
          name: diagrams
          path: docs/diagrams/*.svg
